name: Build rtl8188fu for Lenovo TB-8505X

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Exact kernel version string'
        required: true
        default: '4.9.190+'
      lenovo_build:
        description: 'Lenovo build number'
        required: true

env:
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
    - name: Checkout rtl8188fu driver
      uses: actions/checkout@v4
      with:
        repository: kelebek333/rtl8188fu
        path: rtl8188fu
        ref: master

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential curl flex git \
          libssl-dev libelf-dev python3 python3-pip \
          unzip wget xz-utils \
          libncurses5-dev libncursesw5-dev

    - name: Setup Android NDK r21e
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip -O ndk.zip
        unzip -q ndk.zip
        echo "NDK_ROOT=$PWD/android-ndk-r21e" >> $GITHUB_ENV
        echo "$PWD/android-ndk-r21e/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
        ln -sf $PWD/android-ndk-r21e/toolchains/llvm/prebuilt/linux-x86_64/bin/clang $PWD/android-ndk-r21e/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-gcc
        ln -sf $PWD/android-ndk-r21e/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++ $PWD/android-ndk-r21e/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-g++

    - name: Download Lenovo kernel source
      run: |
        wget -q https://github.com/CoderCharmander/tb8505f-kernel/archive/refs/heads/master.zip -O kernel.zip
        unzip -q kernel.zip
        mv tb8505f-kernel-master kernel

    - name: Patch kernel for Ubuntu 22.04
      run: |
        cd kernel
        sed -i 's/YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.l
        sed -i 's/HOSTCFLAGS   = -Wall/HOSTCFLAGS   = -Wall -fcommon/' Makefile

    - name: Prepare kernel config
      run: |
        cd kernel
        if [ -f "../config.gz" ]; then
          zcat ../config.gz > .config
        else
          make ARCH=arm64 defconfig
        fi
        ./scripts/config --enable CONFIG_MAC80211
        ./scripts/config --enable CONFIG_CFG80211
        ./scripts/config --disable CONFIG_MODULE_SIG
        ./scripts/config --disable CONFIG_MODULE_SIG_FORCE
        make ARCH=arm64 olddefconfig
        grep -E "CONFIG_MAC80211|CONFIG_CFG80211" .config

    - name: Build kernel for Module.symvers
      run: |
        cd kernel
        export ARCH=arm64
        export CROSS_COMPILE="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-"
        export CC=clang
        make ARCH=arm64 headers_install prepare
        make ARCH=arm64 -j$(nproc) Image.gz modules
        ls -la Module.symvers

    - name: Build rtl8188fu module
      run: |
        cd rtl8188fu
        export ARCH=arm64
        export KSRC="$PWD/../kernel"
        export CROSS_COMPILE="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android-"
        export CC=clang
        make -C "$KSRC" M="$PWD" modules

    - name: Verify and package
      run: |
        cd rtl8188fu
        modinfo rtl8188fu.ko | grep vermagic
        file rtl8188fu.ko
        mkdir -p $PWD/../artifacts
        cp rtl8188fu.ko $PWD/../artifacts/
        cp firmware/rtl8188fufw.bin $PWD/../artifacts/ 2>/dev/null || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rtl8188fu-tb8505x-${{ github.event.inputs.lenovo_build }}
        path: artifacts/
        retention-days: 90

