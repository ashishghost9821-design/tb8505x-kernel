name: Build TB-8505X Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make libelf-dev git wget zip

      - name: Download Clang 9.0.3 toolchain
        run: |
          mkdir -p clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android10-release/clang-r353983c.tar.gz -O clang.tar.gz
          tar -xf clang.tar.gz -C clang

      - name: Clone kernel source
        run: |
          git clone --depth=1 https://github.com/CoderCharmander/tb8505f-kernel.git kernel

      - name: Configure kernel
        run: |
          cd kernel
          make O=out ARCH=arm64 tb8505f_defconfig

      - name: Enable MAC80211 and RTL8188EU
        run: |
          cd kernel
          echo "CONFIG_MAC80211=y" >> out/.config
          echo "CONFIG_CFG80211=y" >> out/.config
          echo "CONFIG_RTL8188EU=m" >> out/.config
          echo "CONFIG_STAGING=y" >> out/.config
          make O=out ARCH=arm64 olddefconfig

      - name: Build kernel
        run: |
          cd kernel
          make O=out ARCH=arm64 \
            CC=$(pwd)/../clang/bin/clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            -j$(nproc) 2>&1 | tail -50

      - name: Upload Image
        uses: actions/upload-artifact@v3
        with:
          name: kernel-image
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
